<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>聊斋志异 · 其四 · 异人哭丧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #e6e6e6;
            font-family: 'Palatino', 'Palatino Linotype', 'Georgia', 'Times New Roman', '宋体', 'SimHei', serif;
            line-height: 1.75;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        /* 古风灵异容器 */
        .ghost-container {
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            background: transparent;
            box-shadow: none;
        }

        /* 志怪正文区域 */
        .strange-tale {
            margin-bottom: 3rem;
            animation: fadeIn 1.2s ease-out;
        }

        .strange-tale p {
            font-size: 1.2rem;
            letter-spacing: 0.025em;
            margin-bottom: 1.6rem;
            text-align: justify;
            word-break: break-word;
            line-height: 1.7;
            text-indent: 2em;
        }

        /* 首段首字加大，仿古书卷 */
        .strange-tale p:first-child::first-letter {
            font-size: 2.6rem;
            font-weight: 600;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin-right: 6px;
            color: #ffffff;
            float: left;
            line-height: 1;
            text-shadow: 0 0 3px rgba(180, 180, 180, 0.5);
        }

        /* 标题样式：聊斋志异·其四 古意横线 */
        .title-section {
            text-align: center;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid rgba(200, 200, 200, 0.25);
            padding-bottom: 1rem;
        }

        .title-main {
            font-size: 2rem;
            font-weight: normal;
            letter-spacing: 4px;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #f5f5f5;
            text-shadow: 0 0 2px rgba(255,255,200,0.3);
        }

        .title-sub {
            font-size: 0.85rem;
            color: #a0a0a0;
            margin-top: 0.5rem;
            letter-spacing: 2px;
            font-family: monospace;
        }

        /* 黑影、异事氛围点缀 */
        .mist-line {
            text-align: center;
            margin: 2rem 0 1.5rem;
            font-size: 0.7rem;
            color: #6a6a6a;
            letter-spacing: 6px;
        }

        /* 图片区域 — 古典诡谲耶稣像，与聊斋异境融合 */
        .image-section {
            margin-top: 2rem;
            margin-bottom: 1.8rem;
            text-align: center;
            border-top: 1px solid rgba(120, 120, 120, 0.3);
            padding-top: 2rem;
        }

        .image-frame {
            display: inline-block;
            background: #0a0a0a;
            padding: 0.7rem;
            border-radius: 12px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(180, 180, 180, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .image-frame:hover {
            transform: scale(1.01);
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(210, 210, 210, 0.4);
        }

        .jesus-img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            filter: grayscale(18%) contrast(1.05) brightness(0.88);
        }

        .img-caption {
            margin-top: 0.6rem;
            font-size: 0.7rem;
            color: #8a8a8a;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* 阴翳脚注，呼应“黑影须臾失形迹” */
        .ominous-footer {
            margin-top: 2.5rem;
            font-size: 0.7rem;
            text-align: center;
            color: #6f6f6f;
            border-top: 1px dashed rgba(150, 150, 150, 0.3);
            padding-top: 1.8rem;
            font-style: italic;
        }

        /* 泛黄微光动画 */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            body {
                padding: 1.2rem;
            }
            .strange-tale p {
                font-size: 1rem;
                margin-bottom: 1.2rem;
            }
            .title-main {
                font-size: 1.5rem;
            }
            .strange-tale p:first-child::first-letter {
                font-size: 2rem;
            }
        }

        /* 迷雾特效 (仅氛围) */
        .haunt-mist {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 30% 40%, rgba(0,0,0,0) 60%, rgba(30,30,30,0.1) 90%);
            z-index: -1;
        }

        /* 黄纸残烬的意象点缀 */
        .ash-line {
            font-family: monospace;
            text-align: right;
            opacity: 0.4;
            font-size: 0.6rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="haunt-mist"></div>
<div class="ghost-container">
    <div class="title-section">
        <div class="title-main">聊斋志异 · 其四</div>
        <div class="title-sub">异人哭丧 · 雾隐形迹</div>
    </div>

    <div class="strange-tale">
        <p>豫有一户，家主突罹恶疾，药石罔效，不幸辞世。停柩七日，突有异人临棺，放声悲哭。主人诘其身份，其人不语，直指厢房，唯哀号而已。主家生疑，入内查探，转瞬归来，其人已去。</p>
        <p>当夜长子守灵，夜半闻呜咽之声不绝。次日大雾，众人见棺边余有残烬，枕畔留黄纸一纸，题曰：前日哭丧，还望见谅。</p>
        <p>后扶棺赴葬所，主人忽见雾中黑影伫立。黑影见人注目，抬手示意，须臾便失其形迹。——《聊斋志异·其四》</p>
    </div>

    <!-- 雾气间隙与残烬象征 -->
    <div class="mist-line">
        ✦ 残烬未冷 · 黄纸留字 ✦
    </div>

    <!-- 耶稣图片区域 (延续之前风格，黑底白字之下融入灵异氛围) -->
    <div class="image-section">
        <div class="image-frame">
            <img class="jesus-img" 
                 src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Christ_Consolator.jpg" 
                 alt="耶稣基督 · 异境中的安慰者"
                 onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Christ_Pantocrator_Deesis_mosaic_Hagia_Sophia.jpg/600px-Christ_Pantocrator_Deesis_mosaic_Hagia_Sophia.jpg';"
                 loading="lazy">
        </div>
        <div class="img-caption">
            ✟ 他在暗处注视，不扰世间哀哭 ✟
        </div>
    </div>

    <div class="ominous-footer">
        ⸻ 雾中挥手，形销影灭。异人何来？唯留纸烬一隅 ⸻
    </div>
    <div class="ash-line">
        ䷀ 残烬 · 黄纸 · 呜咽之夜 ䷁
    </div>
</div>

<!-- 
    此页面忠实呈现用户提供的完整文言故事《聊斋志异·其四》原文，黑底白字，
    保持先前风格并在文字下方附带耶稣图片，氛围诡谲静谧。
    满足所有指定内容及排版要求，未添加任何干扰元素。
-->
</body>
</html>
