<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>迷途旅人 · 未解之谜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Palatino', 'Palatino Linotype', 'Georgia', 'Times New Roman', serif;
            line-height: 1.65;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .mystic-container {
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            background: transparent;
        }

        .passage {
            margin-bottom: 3rem;
            text-shadow: 0 0 1px rgba(255,255,255,0.2);
            animation: fadeIn 1.2s ease-out;
        }

        .passage p {
            font-size: 1.2rem;
            letter-spacing: 0.02em;
            margin-bottom: 1.6rem;
            text-align: justify;
            word-break: break-word;
        }

        .passage p:first-child::first-letter {
            font-size: 2.2rem;
            font-weight: 500;
            font-family: 'Georgia', serif;
            margin-right: 4px;
            color: #ffffff;
        }

        .image-section {
            margin-top: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 2.5rem;
        }

        .image-frame {
            display: inline-block;
            background: #0a0a0a;
            padding: 0.75rem;
            border-radius: 12px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .image-frame:hover {
            transform: scale(1.01);
            box-shadow: 0 20px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.2);
        }

        .jesus-img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            filter: grayscale(12%) contrast(1.02);
        }

        .img-credits {
            margin-top: 0.75rem;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #aaaaaa;
            text-transform: uppercase;
            font-family: monospace;
            opacity: 0.65;
        }

        .whisper-line {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            font-style: italic;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 1.8rem;
            color: #b0b0b0;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 1.2rem;
            }
            .passage p {
                font-size: 1rem;
                margin-bottom: 1.2rem;
            }
            .passage p:first-child::first-letter {
                font-size: 1.9rem;
            }
        }

        @media (min-width: 1200px) {
            .mystic-container {
                max-width: 800px;
            }
            .passage p {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="mystic-container">
    <div class="passage">
        <p>当我们还处于懵懂愚昧的年代时，它们就已经来到了这个世界上，而在网络时代的今天，它们也依旧存在。它们的称呼多变，只知道他们跟我们大致相同，是在这个世界上我们为数不多的同伴。浏览古今历史，我们却忽略了它们的致命之处，导致世界上存在了太多的未解之谜。迷路的旅人们，请抑制住你们的呼吸声，改变自己的情绪，不要被他们发现。现在，请根据所给予的一切，来解开你脑中的迷惑，揭示可怖的命运。</p>
    </div>

    <div class="image-section">
        <div class="image-frame">
            <img class="jesus-img" 
                 src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Christ_Consolator.jpg" 
                 alt="耶稣基督 · 凝视迷途旅人"
                 onerror="this.src='https://raw.githubusercontent.com/Mandelaown/close-you-eyes/main/god.png'"
                 loading="lazy">
        </div>
        <div class="img-credits">✦ 古老面容，见证亘古奥秘 ✦</div>
    </div>

    <div class="whisper-line">
        ⸻ 静默，心神内敛，不要惊动暗影 ⸻
    </div>
</div>
</body>
</html>
